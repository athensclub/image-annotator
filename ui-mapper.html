<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>UI Mapper</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --panel: #111;
    --panel-2: #161616;
    --border: #232323;
    --border-2: #2e2e2e;
    --text: #e5e5e5;
    --muted: #6b6b6b;
    --accent: #ef4444;
    --accent-soft: rgba(239, 68, 68, 0.18);
    --accent-deep: #fff;
  }

  html, body { height: 100%; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
  }

  .app { display: flex; flex-direction: column; height: 100vh; }

  /* Toolbar */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 20px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .brand {
    font-family: "SF Mono", "JetBrains Mono", Menlo, monospace;
    font-size: 12px;
    letter-spacing: 0.12em;
    color: var(--accent);
    text-transform: uppercase;
    margin-right: 12px;
    padding-right: 18px;
    border-right: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .brand-dot {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 12px var(--accent);
  }

  .btn, .file-btn {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 13px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    border-radius: 6px;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    user-select: none;
  }

  .btn:hover, .file-btn:hover {
    background: #1d1d1d;
    border-color: var(--border-2);
  }

  .btn:active { transform: translateY(1px); }

  .btn[disabled] { opacity: 0.4; cursor: not-allowed; }
  .btn[disabled]:hover { background: var(--panel-2); border-color: var(--border); }

  .btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--accent-deep);
    font-weight: 600;
  }

  .btn .kbd {
    font-family: "SF Mono", Menlo, monospace;
    font-size: 10px;
    padding: 1px 4px;
    background: rgba(255,255,255,0.06);
    border-radius: 3px;
    margin-left: 4px;
  }

  .btn.active .kbd { background: rgba(0,0,0,0.15); }

  .divider {
    width: 1px;
    height: 22px;
    background: var(--border);
    margin: 0 4px;
  }

  .spacer { flex: 1; }

  .stats {
    display: flex;
    gap: 14px;
    font-family: "SF Mono", Menlo, monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .stats span b {
    color: var(--text);
    font-weight: 500;
  }

  #upload { display: none; }

  .num-start-label {
    font-size: 12px;
    color: var(--muted);
    user-select: none;
    white-space: nowrap;
  }

  .num-start-input {
    width: 54px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 8px;
    font-size: 13px;
    font-family: "SF Mono", Menlo, monospace;
    border-radius: 6px;
    text-align: center;
    -moz-appearance: textfield;
    transition: border-color 0.15s;
  }

  .num-start-input::-webkit-inner-spin-button,
  .num-start-input::-webkit-outer-spin-button { opacity: 0.4; }

  .num-start-input:hover { border-color: var(--border-2); }
  .num-start-input:focus { outline: none; border-color: var(--accent); }

  /* Canvas area */
  .canvas-area {
    flex: 1;
    overflow: auto;
    background-color: #0d0d0d;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 24px 24px;
    padding: 40px;
    position: relative;
    display: flex;
    align-items: flex-start;
    justify-content: flex-start;
  }

  .canvas-wrap {
    position: relative;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
    line-height: 0;
    margin: auto;
    flex-shrink: 0;
  }

  #canvas {
    display: block;
    max-width: 100%;
    background: #fff;
    cursor: crosshair;
  }

  #canvas.hidden { display: none; }

  /* Empty state */
  .empty {
    text-align: center;
    color: var(--muted);
    max-width: 420px;
    padding: 60px 30px;
    border: 1px dashed var(--border-2);
    border-radius: 12px;
    background: rgba(255,255,255,0.01);
    margin: auto;
  }

  .empty h2 {
    font-size: 16px;
    color: var(--text);
    margin-bottom: 8px;
    font-weight: 500;
  }

  .empty p {
    font-size: 13px;
    line-height: 1.6;
    margin-bottom: 20px;
  }

  .empty .file-btn {
    display: inline-flex;
  }

  .icon {
    width: 14px;
    height: 14px;
    stroke-width: 2;
    fill: none;
    stroke: currentColor;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* Footer hint */
  .hint {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    font-family: "SF Mono", Menlo, monospace;
    font-size: 11px;
    color: var(--muted);
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(6px);
    padding: 6px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .hint.show { opacity: 1; }
</style>
</head>
<body>
<div class="app">
  <header class="toolbar">
    <div class="brand">
      <span class="brand-dot"></span>
      UI Mapper
    </div>

    <label class="file-btn" for="upload">
      <svg class="icon" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Upload Image
    </label>
    <input type="file" id="upload" accept="image/*" />

    <div class="divider"></div>

    <button class="btn active" data-tool="rect">
      <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="1"/></svg>
      Rectangle <span class="kbd">R</span>
    </button>
    <button class="btn" data-tool="number">
      <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M9 9h6M12 9v9"/></svg>
      Number <span class="kbd">N</span>
    </button>
    <label class="num-start-label" for="num-start">Start #</label>
    <input type="number" id="num-start" class="num-start-input" value="1" min="0" step="1" />

    <div class="divider"></div>

    <button class="btn" id="undo" disabled>
      <svg class="icon" viewBox="0 0 24 24"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-15-6.7L3 13"/></svg>
      Undo <span class="kbd">⌘Z</span>
    </button>
    <button class="btn" id="clear" disabled>Clear</button>

    <div class="spacer"></div>

    <div class="stats">
      <span><b id="stat-rect">0</b> rects</span>
      <span><b id="stat-num">0</b> points</span>
    </div>

    <div class="divider"></div>

    <button class="btn" id="export" disabled>
      <svg class="icon" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Export PNG
    </button>
  </header>

  <main class="canvas-area" id="area">
    <div class="empty" id="empty">
      <h2>Drop or upload an image to begin</h2>
      <p>Choose <b>Rectangle</b> to draw bounding boxes, or <b>Number</b> to drop ordered point markers. Annotations bake into the exported PNG.</p>
      <label class="file-btn" for="upload">
        <svg class="icon" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Select an image
      </label>
    </div>
    <div class="canvas-wrap" id="wrap" style="display:none;">
      <canvas id="canvas"></canvas>
    </div>
    <div class="hint" id="hint"></div>
  </main>
</div>

<script>
  const $ = (id) => document.getElementById(id);
  const canvas = $("canvas");
  const ctx = canvas.getContext("2d");
  const area = $("area");
  const hint = $("hint");

  const state = {
    image: null,
    imageName: null,
    tool: "rect",
    annotations: [],
    drawing: null,
    numberStart: 1,
    numberCounter: 1,
  };

  function fmtTool() {
    return state.tool === "rect"
      ? "Drag to draw a rectangle"
      : "Click to place a numbered point";
  }

  function showHint(msg) {
    hint.textContent = msg;
    hint.classList.add("show");
    clearTimeout(showHint._t);
    showHint._t = setTimeout(() => hint.classList.remove("show"), 1600);
  }

  function updateStats() {
    const rects = state.annotations.filter(a => a.type === "rect").length;
    const nums = state.annotations.filter(a => a.type === "number").length;
    $("stat-rect").textContent = rects;
    $("stat-num").textContent = nums;

    const hasAny = state.annotations.length > 0;
    $("undo").disabled = !hasAny;
    $("clear").disabled = !hasAny;
    $("export").disabled = !state.image;
  }

  function drawAnnotation(a) {
    if (a.type === "rect") {
      const { x, y, w, h } = a;
      ctx.strokeStyle = "#ef4444";
      ctx.lineWidth = Math.max(2, state.image ? state.image.width / 800 : 2);
      ctx.strokeRect(x, y, w, h);
    } else if (a.type === "number") {
      const r = Math.max(16, state.image ? state.image.width / 60 : 16);
      ctx.fillStyle = "#ef4444";
      ctx.strokeStyle = "#fff";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(a.x, a.y, r, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = "#fff";
      ctx.font = `bold ${Math.round(r * 1.1)}px -apple-system, system-ui, sans-serif`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(String(a.n), a.x, a.y + 1);
    }
  }

  function redraw() {
    if (!state.image) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      return;
    }
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(state.image, 0, 0);
    for (const a of state.annotations) drawAnnotation(a);
    if (state.drawing) {
      const d = { ...state.drawing };
      if (d.w < 0) { d.x += d.w; d.w = -d.w; }
      if (d.h < 0) { d.y += d.h; d.h = -d.h; }
      drawAnnotation(d);
    }
  }

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    return {
      x: (e.clientX - rect.left) * scaleX,
      y: (e.clientY - rect.top) * scaleY,
    };
  }

  /* Image upload */
  function loadImageFile(file) {
    if (!file || !file.type.startsWith("image/")) return;
    const img = new Image();
    img.onload = () => {
      state.image = img;
      state.imageName = file.name || "ui-map";
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      state.annotations = [];
      state.drawing = null;
      state.numberCounter = state.numberStart;
      $("empty").style.display = "none";
      $("wrap").style.display = "";
      redraw();
      updateStats();
      showHint(fmtTool());
    };
    img.src = URL.createObjectURL(file);
  }

  $("upload").addEventListener("change", (e) => {
    const file = e.target.files && e.target.files[0];
    loadImageFile(file);
    e.target.value = "";
  });

  /* Drag and drop */
  ["dragenter", "dragover"].forEach(ev =>
    area.addEventListener(ev, (e) => { e.preventDefault(); })
  );
  area.addEventListener("drop", (e) => {
    e.preventDefault();
    const file = e.dataTransfer.files && e.dataTransfer.files[0];
    loadImageFile(file);
  });

  /* Tool selection */
  function setTool(name) {
    state.tool = name;
    document.querySelectorAll("[data-tool]").forEach(b =>
      b.classList.toggle("active", b.dataset.tool === name)
    );
    canvas.style.cursor = name === "rect" ? "crosshair" : "cell";
    showHint(fmtTool());
  }
  document.querySelectorAll("[data-tool]").forEach(btn => {
    btn.addEventListener("click", () => setTool(btn.dataset.tool));
  });

  /* Canvas interaction */
  let pressed = false;

  canvas.addEventListener("mousedown", (e) => {
    if (!state.image || state.tool !== "rect") return;
    if (e.button !== 0) return;
    pressed = true;
    const p = getPos(e);
    state.drawing = { type: "rect", x: p.x, y: p.y, w: 0, h: 0 };
  });

  window.addEventListener("mousemove", (e) => {
    if (!state.drawing || !pressed) return;
    const p = getPos(e);
    state.drawing.w = p.x - state.drawing.x;
    state.drawing.h = p.y - state.drawing.y;
    redraw();
  });

  window.addEventListener("mouseup", (e) => {
    if (!pressed) return;
    pressed = false;
    if (state.drawing) {
      let { x, y, w, h } = state.drawing;
      if (w < 0) { x += w; w = -w; }
      if (h < 0) { y += h; h = -h; }
      if (w > 3 && h > 3) {
        state.annotations.push({ type: "rect", x, y, w, h });
      }
      state.drawing = null;
      redraw();
      updateStats();
    }
  });

  canvas.addEventListener("click", (e) => {
    if (!state.image || state.tool !== "number") return;
    const p = getPos(e);
    state.annotations.push({
      type: "number",
      x: p.x,
      y: p.y,
      n: state.numberCounter++,
    });
    redraw();
    updateStats();
  });

  /* Undo / clear / export */
  function undo() {
    const last = state.annotations.pop();
    if (last && last.type === "number") {
      state.numberCounter = Math.max(1, state.numberCounter - 1);
    }
    redraw();
    updateStats();
  }

  $("undo").addEventListener("click", undo);

  $("clear").addEventListener("click", () => {
    state.annotations = [];
    state.numberCounter = state.numberStart;
    redraw();
    updateStats();
  });

  $("num-start").addEventListener("change", (e) => {
    const val = parseInt(e.target.value, 10);
    if (!isNaN(val)) {
      state.numberStart = val;
      state.numberCounter = val;
    } else {
      e.target.value = state.numberStart;
    }
  });

  $("export").addEventListener("click", () => {
    if (!state.image) return;
    const base = (state.imageName || "ui-map").replace(/\.[^.]+$/, "");
    const link = document.createElement("a");
    link.download = `${base}-annotated.png`;
    link.href = canvas.toDataURL("image/png");
    link.click();
  });

  /* Keyboard shortcuts */
  window.addEventListener("keydown", (e) => {
    const target = e.target;
    if (target instanceof HTMLInputElement || target instanceof HTMLTextAreaElement) return;
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "z") {
      e.preventDefault();
      if (state.annotations.length) undo();
      return;
    }
    if (e.key.toLowerCase() === "r") setTool("rect");
    if (e.key.toLowerCase() === "n") setTool("number");
  });

  /* Paste image from clipboard */
  window.addEventListener("paste", (e) => {
    const items = e.clipboardData && e.clipboardData.items;
    if (!items) return;
    for (const it of items) {
      if (it.type.startsWith("image/")) {
        loadImageFile(it.getAsFile());
        break;
      }
    }
  });

  updateStats();
</script>
</body>
</html>
